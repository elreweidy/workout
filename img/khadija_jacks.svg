<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
            
        <defs>
            <radialGradient id="bg-grad" cx="50%" cy="50%" r="75%">
                <stop offset="0%" stop-color="#fff6f8" />
                <stop offset="100%" stop-color="#ffe3eb" />
            </radialGradient>
            <linearGradient id="rose-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ff6b8b" />
                <stop offset="100%" stop-color="#ff3b68" />
            </linearGradient>
            <linearGradient id="abaya-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#ff8fa8" />
                <stop offset="100%" stop-color="#ff6b8b" />
            </linearGradient>
            <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
                <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#ff8fa8" flood-opacity="0.25" />
            </filter>
        </defs>
        <!-- Background Card -->
        <rect width="100%" height="100%" fill="url(#bg-grad)" rx="24" />
        
        <!-- Decorative Gym elements -->
        <g opacity="0.4">
            <circle cx="60" cy="60" r="30" fill="#ffffff" />
            <circle cx="340" cy="80" r="20" fill="#ffffff" />
            <rect x="20" y="320" width="360" height="60" rx="10" fill="#ffbccc" opacity="0.3" />
            <!-- Horizontal gym line -->
            <line x1="0" y1="350" x2="400" y2="350" stroke="#ffbccc" stroke-width="3" stroke-dasharray="12, 12" />
        </g>
        
        <!-- Star Sparkles for a Cute Magic/Girly feel -->
        <g fill="#ffd05e">
            <!-- Sparkle 1 -->
            <path d="M 330 50 L 333 55 L 338 56 L 334 60 L 335 65 L 330 62 L 325 65 L 326 60 L 322 56 L 327 55 Z" />
            <!-- Sparkle 2 -->
            <path d="M 70 280 L 72 283 L 76 284 L 73 287 L 74 291 L 70 289 L 66 291 L 67 287 L 64 284 L 68 283 Z" transform="scale(0.8) translate(10, 10)" />
            <!-- Sparkle 3 -->
            <path d="M 300 240 L 302 243 L 306 244 L 303 247 L 304 251 L 300 249 L 296 251 L 297 247 L 294 244 L 298 243 Z" transform="scale(0.7) translate(100, 50)" />
        </g>
        
            
            <!-- Stepping out wide with arms up -->
            <!-- Left Leg (Straight down) -->
            <rect x="170" y="270" width="12" height="85" rx="5" fill="#ff8fa8" />
            <ellipse cx="176" cy="355" rx="8" ry="4" fill="#2d2d2d" />
            
            <!-- Right Leg (Stepping out) -->
            <g transform="translate(200, 270) rotate(-20) translate(-200, -270)">
                <rect x="218" y="270" width="12" height="85" rx="5" fill="#ff8fa8" />
                <ellipse cx="224" cy="355" rx="8" ry="4" fill="#2d2d2d" />
            </g>
            
            <!-- Abaya Torso Gown -->
            <path d="M 175 140 L 225 140 L 255 280 L 145 280 Z" fill="url(#abaya-grad)" filter="url(#shadow)" />
            
            <!-- Arms raised in Y shape -->
            <path d="M 175 145 Q 120 110 100 80" stroke="#ff8fa8" stroke-width="12" stroke-linecap="round" fill="none" />
            <path d="M 225 145 Q 280 110 300 80" stroke="#ff8fa8" stroke-width="12" stroke-linecap="round" fill="none" />
            
            <!-- Gloves -->
            <circle cx="100" cy="80" r="7" fill="#2d2d2d" />
            <circle cx="300" cy="80" r="7" fill="#2d2d2d" />
            
            <!-- Movement/Sparkle dashed lines -->
            <path d="M 85 95 Q 100 65 120 90" stroke="#ff8fa8" stroke-width="2" stroke-dasharray="4, 4" fill="none" />
            <path d="M 315 95 Q 300 65 280 90" stroke="#ff8fa8" stroke-width="2" stroke-dasharray="4, 4" fill="none" />
            
            
        <!-- ANIME HEAD GROUP (Niqab, Hijab, Rose, Cute Eyes) -->
        <g transform="translate(0, 0)">
            <!-- Hijab base (draping back) -->
            <path d="M 160 110 Q 150 70 200 60 Q 250 70 240 110 Q 255 150 220 160 Q 200 170 180 160 Q 145 150 160 110 Z" fill="#2d2d2d" filter="url(#shadow)" />
            
            <!-- Face Skin (eyes opening) -->
            <path d="M 175 100 Q 200 90 225 100 L 220 120 Q 200 115 180 120 Z" fill="#fff0e8" />
            
            <!-- Big Cute Anime Sparkly Eyes -->
            <!-- Left Eye -->
            <ellipse cx="190" cy="107" rx="7" ry="9" fill="#1e1e1e" />
            <circle cx="188" cy="104" r="2.5" fill="#ffffff" />
            <circle cx="192" cy="109" r="1" fill="#ffffff" />
            <path d="M 180 105 Q 190 98 198 106" stroke="#1e1e1e" stroke-width="2.5" stroke-linecap="round" fill="none" />
            
            <!-- Right Eye -->
            <ellipse cx="210" cy="107" rx="7" ry="9" fill="#1e1e1e" />
            <circle cx="208" cy="104" r="2.5" fill="#ffffff" />
            <circle cx="212" cy="109" r="1" fill="#ffffff" />
            <path d="M 202 106 Q 210 98 220 105" stroke="#1e1e1e" stroke-width="2.5" stroke-linecap="round" fill="none" />
            
            <!-- Pink Blush Cheeks -->
            <ellipse cx="185" cy="113" rx="5" ry="2.5" fill="#ff7da0" opacity="0.6" />
            <ellipse cx="215" cy="113" rx="5" ry="2.5" fill="#ff7da0" opacity="0.6" />
            
            <!-- Front Niqab Veil -->
            <path d="M 174 116 C 172 135 180 165 200 168 C 220 165 228 135 226 116 Z" fill="#2d2d2d" />
            <path d="M 174 116 Q 200 112 226 116" stroke="#1c1c1c" stroke-width="2" fill="none" />
            
            <!-- The Beautiful Pink Rose on Head -->
            <g transform="translate(222, 70)">
                <!-- Green Leaves -->
                <path d="M -6 -2 Q -12 -10 -2 -14 Q 5 -10 1 -2 Z" fill="#6bc285" />
                <path d="M 6 -2 Q 12 5 2 10 Q -5 5 -1 -2 Z" fill="#6bc285" transform="rotate(45)" />
                <!-- Rose Petals Layered -->
                <circle cx="0" cy="0" r="8" fill="url(#rose-grad)" />
                <path d="M -4 -2 Q 0 -8 4 -2" stroke="#ff8fa8" stroke-width="1.5" fill="none" />
                <path d="M -2 2 Q 2 6 5 0" stroke="#ff8fa8" stroke-width="1.5" fill="none" />
                <circle cx="0" cy="0" r="3" fill="#ff3b68" />
            </g>
        </g>
        
        </svg>